# 冰冻

enabled: true
placeholder: '{lang:power.freeze}'

apply-rules:
  group: melee_control
  weight: 8
  match-entity:
    ranged: false
    not:
      entity-types:
        - CREEPER
  level-weight: 12~22

on-melee-attack:
  conditions:
    accept-source: true
  abilities:
    1:
      type: freeze
      freeze-ticks: 80
    2:
      type: potion_effect
      effect: SLOWNESS
      duration: '{level} * 5'
      amplifier: 1
