# 潜行隐匿型：常驻隐身提升突袭性。
enabled: true
placeholder: '{lang:power.cloaked}'
apply-rules:
  group: potion
  weight: 2
  match-entity:
    any: true
  level-weight: 20
on-spawn:
  abilities:
    1:
      type: potion_effect
      target: SOURCE
      potion: INVISIBILITY
      duration: 999999
      amplifier: 0
      particles: false
      icon: false
on-damage:
  conditions:
    by-entity: true
    match-damager:
      entity-types:
        - PLAYER
  abilities:
    1:
      type: remove_potion_effect
      target: TARGET
      potion: INVISIBILITY
    2:
      type: delay
      delay: 60
      abilities:
        1:
          type: potion_effect
          target: TARGET
          potion: INVISIBILITY
          duration: 999999
          amplifier: 0
          particles: false
          icon: false
