# 近战命中时缴械玩家主手。

enabled: true
placeholder: '{lang:power.disarm}'

apply-rules:
  group: melee_control
  weight: 7
  match-entity:
    ranged: false
    not:
      entity-types:
        - CREEPER
  level-weight: 30

limit:
