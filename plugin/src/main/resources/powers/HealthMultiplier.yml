# 生成时增加最大生命值。

enabled: true
placeholder: '{lang:power.health_multiplier}'

apply-rules:
  group: misc
  weight: 36
  level-weight: 20
  match-entity:
    any: true

limit:
  random: 1
  cooldown: -1

on-spawn:
  abilities:
    1:
      type: set_health
      amount: '{health} * (1.2 + {level} / 50)'
