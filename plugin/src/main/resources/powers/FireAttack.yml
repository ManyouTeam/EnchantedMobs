# 攻击后着火

enabled: true
placeholder: '{lang:power.burning}'

apply-rules:
  group: melee_control
  weight: 5
  match-entity:
    ranged: false
    not:
      entity-types:
        - CREEPER
  level-weight: 10~20

limit:
  random: '{level} / 20'
  cooldown: -1

on-melee-attack:
  conditions:
    accept-source: true
  abilities:
    1:
      type: fire
      fire-ticks: 100
