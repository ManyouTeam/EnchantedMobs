# 火球远程型：发射火球进行区域压制。
enabled: true
placeholder: '{lang:power.ghastly}'
apply-rules:
  group: ranged_magic
  weight: 3
  match-entity:
    any: true
  level-weight: 30~70
on-target-tick:
  abilities:
    1:
      type: limit
      random: '0.08 + {level} / 500'
      cooldown: '12 - {level} / 10'
      abilities:
        1:
          type: launch_projectile
          target: SOURCE
          entity-type: FIREBALL
          speed: '0.85 + {level} / 250'
