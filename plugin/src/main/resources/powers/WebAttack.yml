# WebAttack
# Generate a spider web beneath the player's feet.
# 在玩家的脚下生成蜘蛛网。

enabled: true
placeholder: '{lang:power.web_attack}'

apply-rules:
  group: melee_control
  weight: 7
  level-weight: 18
  match-entity:
    entity-type:
      - "ZOMBIE"
      - "SPIDER"
      - "CAVE_SPIDER"

limit:
  random: 0.2
  cooldown: 2

on-melee-attack:
  abilities:
    1:
      type: delay
      delay: 1
      abilities:
        1:
          type: place_block
          block: cobweb
          duration: '80'
        2:
          type: sound
          sound: BLOCK_WOOL_PLACE
        3:
          type: particle
          particle: BLOCK
          count: 20
          block: cobweb
