# 追击冲锋型：出生时提升移动速度。
enabled: true
placeholder: '{lang:power.sprint}'
apply-rules:
  group: movement
  group-unique: true
  weight: 5
  match-entity:
    any: true
  level-weight: 8~25
on-spawn:
  abilities:
    1:
      type: set_attribute
      target: SOURCE
      attribute: MOVEMENT_SPEED
      value: '{now} * (1.2 + {level} / 250)'