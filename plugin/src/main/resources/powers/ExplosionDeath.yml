# 死亡后爆炸。

enabled: true
placeholder: '{lang:power.explosion_death}'

apply-rules:
  group: death
  group-unique: true
  weight: 14
  level-weight: 30
  match-entity:
    entity-tag:
      - 'arthropod'
      - 'undead'
      - 'illager'

limit:
  random: 1
  cooldown: -1

on-death:
  abilities:
    1:
      type: delay
      delay: 5
      abilities:
        1:
          type: explosion
          yield: 2.0
          set-fire: false
          break-blocks: false
        2:
          type: sound
          sound: ENTITY_TNT_PRIMED

