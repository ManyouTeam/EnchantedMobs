# Arrow Rain
# Summons arrows from above target area.
# 在目标区域上空召唤箭雨。

enabled: true
placeholder: '{lang:power.arrow_rain}'

apply-rules:
  group: ranged_projectile
  weight: 4
  match-entity:
    ranged: true
  level-weight: 20~40

limit:
  random: 0.45
  cooldown: 10
  times:
    ">=20;;<30": 4
    ">=30": 8

on-target-tick:
  abilities:
    1:
      type: arrow_rain
      target: TARGET
      count:
        ">=20;;<30": 8
        ">=30": 14
      radius: 4.5
      height: 12
      spread: 0.22
      damage:
        ">=20;;<30": 3.5
        ">=30": 5.0
      critical: false
      pierce-level:
        ">=30": 1
