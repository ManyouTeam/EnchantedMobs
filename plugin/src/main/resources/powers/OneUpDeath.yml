# OneUp
# 死亡后复活。

enabled: true
placeholder: '{lang:power.one_up}'

apply-rules:
  group: death
  group-unique: true
  weight: 14
  level-weight: 30
  match-entity:
    entity-tag:
      - 'arthropod'
      - 'undead'
      - 'illager'

limit:
  random: 1
  times: 1

on-death:
  modifier:
    revive-health: '{original} / 2'

