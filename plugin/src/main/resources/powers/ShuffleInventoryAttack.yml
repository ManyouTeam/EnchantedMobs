# ShuffleInventoryAttack
# Shuffle player's hotbar/backpack slots when hit by melee.
# 近战命中时打乱玩家背包栏位。

enabled: true
placeholder: '{lang:power.shuffle_inventory}'

apply-rules:
  group: melee_control
  weight: 5
  match-entity:
    any: true
  level-weight: 20~40

limit:
  random: 0.2
  cooldown: 8

on-melee-attack:
  abilities:
    1:
      type: shuffle_inventory
      target: TARGET
      start-slot: 0
      end-slot: 35
