# 远程箭雨型：周期性发射三连箭压制目标。

enabled: true
placeholder: '{lang:power.archer}'
apply-rules:
  group: ranged_projectile
  group-unique: true
  weight: 4
  match-entity:
    ranged: true
  level-weight: 15~45
on-target-tick:
  abilities:
    1:
      type: limit
      random: '0.12 + {level} / 400'
      cooldown: '14 - {level} / 8'
      abilities:
        1:
          type: launch_projectile
          entity-type: ARROW
          speed: '1.55 + {level} / 120'
        2:
          type: launch_projectile
          entity-type: ARROW
          speed: '1.45 + {level} / 140'
          extra-y: 0.07
        3:
          type: launch_projectile
          entity-type: ARROW
          speed: '1.45 + {level} / 140'
          extra-y: -0.07