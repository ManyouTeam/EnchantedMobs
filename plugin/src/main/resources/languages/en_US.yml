command:
  player-power: "&#98FB98[EnchantedMobs] &f{player}'s power: &e{power}"
  chunk-power: "&#98FB98[EnchantedMobs] &fCurrent location power &7({world} {x}, {z})&f: &e{power}"
  entity-skills: "&#98FB98[EnchantedMobs] &fEntity &e{entity}&f skills: &7{skills}"

mob-spawned: "&#98FB98[EnchantedMobs] &fMob spawned successfully!"

mob-powered-notify: "&#98FB98[EnchantedMobs] &ePowered mob spawned: &f{mob} &7@ &b{world}({x}, {y}, {z})"

