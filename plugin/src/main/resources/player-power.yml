formula: "{equipment_sum} + ({backpack_max} + {backpack_avg}) / 2"
# true: 仅重算变化槽位（高性能）
# false: 每次背包变化全量重算（兼容模式）
incremental-slot-update: true

rules:
  diamond-sword:
    match-item:
      material:
        - DIAMOND_SWORD
    add-weight: 10
  armor:
    match-item:
      material-tag:
        - 'enchantable/armor'
    add-weight: 12
