name: EnchantedMobs
version: '1.0.0'
main: cn.superiormc.enchantedmobs.EnchantedMobs
api-version: '1.21.2'
author: PQguanfang
softdepend:
  - MMOItems
  - MythicLib
  - ItemsAdder
  - Oraxen
  - EcoItems
  - EcoArmor
  - PlaceholderAPI
  - MythicMobs
  - CraftEngine
  - NeigeItems
  - ExecutableItems
  - MythicChanger
  - NBTAPI
  - LevelledMobs
  - MythicChanger
commands:
  enchantedmobs:
    aliases:
      - "emobs"
      - "em"
    usage: "/enchantedmobs"
    description: "EnchantedMobs Main Command."
permissions:
  enchantedmobs.nodify:
    description: Receive powered mob spawn notifications
    default: op

  enchantedmobs.entityskills:
    description: View available skills for entity type
    default: op
